<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - SkyBlogging</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">SkyBlogging</a>
            <div class="nav-links" id="nav-links"></div>
            <button id="theme-toggle" class="theme-toggle">🌙</button>
        </div>
    </nav>

    <main class="main-content editor-page">
        <div class="editor-container">
            <input type="text" id="post-title" class="editor-title" placeholder="Title" required>
            <textarea id="post-content" class="editor-content" placeholder="Tell your story..." required></textarea>
            <div class="editor-actions">
                <button id="publish-btn" class="btn btn-primary">Publish</button>
            </div>
            <div id="error-message" class="error-message mt-1"></div>
        </div>
    </main>

    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/auth.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!isAuthenticated()) {
                window.location.href = '/login';
                return;
            }

            document.getElementById('publish-btn').addEventListener('click', async () => {
                const title = document.getElementById('post-title').value;
                const content = document.getElementById('post-content').value;
                const errorDiv = document.getElementById('error-message');

                if (!title || !content) {
                    errorDiv.textContent = 'Title and content are required';
                    return;
                }

                try {
                    const response = await fetchWithAuth('/api/posts', {
                        method: 'POST',
                        body: JSON.stringify({ title, content })
                    });

                    if (response.ok) {
                        const post = await response.json();
                        window.location.href = `/post/${post.id}`;
                    } else {
                        const err = await response.json();
                        errorDiv.textContent = err.message || 'Failed to create post';
                    }
                } catch (e) {
                    errorDiv.textContent = 'Network error';
                }
            });
        });
    </script>
</body>
</html>
